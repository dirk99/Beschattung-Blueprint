blueprint:
  name: "Intervall-Beschattungs-Management (Minütlicher Check)"
  description: "Prüft jede Minute Azimut, Temperatur und Helligkeit und setzt die Rollläden/Markise entsprechend."
  domain: automation
  input:
    # Sensoren
    illuminance_sensor:
      name: Helligkeitssensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: illuminance
    temp_sensor:
      name: Temperatursensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    
    # Schwellenwerte
    illuminance_limit:
      name: Helligkeits-Grenzwert
      description: "Oberhalb dieses Wertes wird beschattet."
      default: 900
      selector:
        number:
          min: 0
          max: 100000
          unit_of_measurement: lx
    temp_limit:
      name: Temperatur-Grenzwert
      description: "Oberhalb dieser Temperatur wird beschattet."
      default: 20
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: "°C"

    # Winkel-Einstellungen
    azimuth_start_haupt:
      name: Azimut Start Hauptbeschattung
      default: 90
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_stop_haupt:
      name: Azimut Ende Hauptbeschattung
      default: 280
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_start_gaube:
      name: Azimut Start Gaubenbeschattung
      default: 190
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_stop_gaube:
      name: Azimut Ende Gaubenbeschattung
      default: 330
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"

    # Aktoren & Positionen
    cover_markise:
      name: Markise Aktor
      selector:
        entity:
          filter:
            - domain: cover
    pos_markise:
      name: Position Markise bei Beschattung
      default: 0
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    covers_haupt:
      name: Haupt-Rollläden/Jalousien
      selector:
        entity:
          multiple: true
          filter:
            - domain: cover
    pos_haupt:
      name: Position Haupt-Rollläden bei Beschattung
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    cover_gaube:
      name: Gauben-Rollladen/Jalousie
      selector:
        entity:
          filter:
            - domain: cover
    pos_gaube:
      name: Position Gaube bei Beschattung
      default: 0
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

# Single-Modus reicht hier, da die Automatisierung schnell durchläuft
mode: single

trigger:
  # Dieser Trigger feuert exakt jede Minute (z.B. um 12:00, 12:01, 12:02, ...)
  - platform: time_pattern
    minutes: "/1"

action:
  # Wir holen uns die Eingabewerte in lokale Variablen, damit wir sie in den Templates nutzen können
  - variables:
      start_haupt: !input azimuth_start_haupt
      stop_haupt: !input azimuth_stop_haupt
      start_gaube: !input azimuth_start_gaube
      stop_gaube: !input azimuth_stop_gaube
      current_azimuth: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"

  # ---------------------------------------------------------------------------
  # BLOCK A: HAUPTBESCHATTUNG (Markise & Hauptrollläden)
  # ---------------------------------------------------------------------------
  - choose:
      # FALL 1: Bedingungen für AKTIVE Hauptbeschattung sind erfüllt
      - conditions:
          - condition: numeric_state
            entity_id: !input illuminance_sensor
            above: !input illuminance_limit
          - condition: numeric_state
            entity_id: !input temp_sensor
            above: !input temp_limit
          - condition: template
            value_template: "{{ current_azimuth >= (start_haupt | float) and current_azimuth < (stop_haupt | float) }}"
        sequence:
          - action: cover.set_cover_position
            data:
              position: !input pos_markise
            target:
              entity_id: !input cover_markise
          - action: cover.set_cover_position
            data:
              position: !input pos_haupt
            target:
              entity_id: !input covers_haupt

      # FALL 2: Sonne ist weitergezogen (Azimut >= Stop-Wert) -> Öffnen
      - conditions:
          - condition: template
            value_template: "{{ current_azimuth >= (stop_haupt | float) }}"
        sequence:
          - action: cover.set_cover_position
            data:
              position: 100
            target:
              entity_id:
                - !input cover_markise
                - !input covers_haupt

  # ---------------------------------------------------------------------------
  # BLOCK B: GAUBENBESCHATTUNG
  # ---------------------------------------------------------------------------
  - choose:
      # FALL 1: Bedingungen für AKTIVE Gaubenbeschattung sind erfüllt
      - conditions:
          - condition: numeric_state
            entity_id: !input illuminance_sensor
            above: !input illuminance_limit
          - condition: numeric_state
            entity_id: !input temp_sensor
            above: !input temp_limit
          - condition: template
            value_template: "{{ current_azimuth >= (start_gaube | float) and current_azimuth < (stop_gaube | float) }}"
        sequence:
          - action: cover.set_cover_position
            data:
              position: !input pos_gaube
            target:
              entity_id: !input cover_gaube

      # FALL 2: Sonne ist an der Gaube vorbei (Azimut >= Stop-Wert) -> Öffnen
      - conditions:
          - condition: template
            value_template: "{{ current_azimuth >= (stop_gaube | float) }}"
        sequence:
          - action: cover.set_cover_position
            data:
              position: 100
            target:
              entity_id: !input cover_gaube
