blueprint:
  name: "Intervall-Beschattungs-Management (Syntax Fix)"
  description: "Prüft jede Minute Azimut, Temperatur und Helligkeit. Schützt Aktoren vor automatischer Veränderung, wenn sie am selben Tag manuell bedient wurden."
  domain: automation
  input:
    # Sensoren
    illuminance_sensor:
      name: Helligkeitssensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: illuminance
    temp_sensor:
      name: Temperatursensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    
    # Schwellenwerte
    illuminance_limit:
      name: Helligkeits-Grenzwert
      default: 900
      selector:
        number:
          min: 0
          max: 100000
          unit_of_measurement: lx
    temp_limit:
      name: Temperatur-Grenzwert
      default: 20
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: "°C"

    # Winkel-Einstellungen
    azimuth_start_haupt:
      name: Azimut Start Hauptbeschattung
      default: 90
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_stop_haupt:
      name: Azimut Ende Hauptbeschattung
      default: 280
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_start_gaube:
      name: Azimut Start Gaubenbeschattung
      default: 190
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"
    azimuth_stop_gaube:
      name: Azimut Ende Gaubenbeschattung
      default: 330
      selector:
        number:
          min: 0
          max: 360
          unit_of_measurement: "°"

    # Aktoren & Positionen
    cover_markise:
      name: Markise Aktor
      selector:
        entity:
          filter:
            - domain: cover
    pos_markise:
      name: Position Markise bei Beschattung
      default: 0
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    covers_haupt:
      name: Haupt-Rollläden/Jalousien
      selector:
        entity:
          multiple: true
          filter:
            - domain: cover
    pos_haupt:
      name: Position Haupt-Rollläden bei Beschattung
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    cover_gaube:
      name: Gauben-Rollladen/Jalousie
      selector:
        entity:
          filter:
            - domain: cover
    pos_gaube:
      name: Position Gaube bei Beschattung
      default: 0
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

action:
  # Das Geheimnis: Hier weisen wir die Inputs sauber als YAML-Variablen zu.
  # Ab hier wird KEIN "!" mehr im gesamten Dokument benötigt.
  - variables:
      sensor_helligkeit: !input illuminance_sensor
      sensor_temp: !input temp_sensor
      limit_helligkeit: !input illuminance_limit
      limit_temp: !input temp_limit
      start_haupt: !input azimuth_start_haupt
      stop_haupt: !input azimuth_stop_haupt
      start_gaube: !input azimuth_start_gaube
      stop_gaube: !input azimuth_stop_gaube
      p_markise: !input pos_markise
      p_haupt: !input pos_haupt
      p_gaube: !input pos_gaube
      markise_entity: !input cover_markise
      gaube_entity: !input cover_gaube
      raw_haupt: !input covers_haupt
      
      current_azimuth: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"
      
      # Macht aus den Haupt-Entitäten ein sauberes Array, völlig ohne "!"
      haupt_entities: "{{ [raw_haupt] if raw_haupt is string else raw_haupt }}"

  # ---------------------------------------------------------------------------
  # BLOCK A: HAUPTBESCHATTUNG (Markise & Hauptrollläden)
  # ---------------------------------------------------------------------------
  - choose:
      # FALL 1: Schließen
      - conditions:
          - condition: template
            value_template: "{{ states(sensor_helligkeit) | float(0) > limit_helligkeit | float }}"
          - condition: template
            value_template: "{{ states(sensor_temp) | float(0) > limit_temp | float }}"
          - condition: template
            value_template: "{{ current_azimuth >= (start_haupt | float) and current_azimuth < (stop_haupt | float) }}"
        sequence:
          # Markise steuern (falls heute nicht manuell bewegt)
          - if:
              - condition: template
                value_template: >-
                  {% set s = states[markise_entity] %}
                  {{ not (s is not none and s.last_changed.date() == now().date() and s.context.parent_id is none and s.context.user_id is not none) }}
            then:
              - action: cover.set_cover_position
                data:
                  position: "{{ p_markise }}"
                target:
                  entity_id: "{{ markise_entity }}"
          
          # Hauptrollläden filtern und steuern
          - action: cover.set_cover_position
            data:
              position: "{{ p_haupt }}"
            target:
              entity_id: >-
                {% set ns = namespace(allowed=[]) %}
                {% for e in haupt_entities %}
                  {% set s = states[e] %}
                  {% set manual = s is not none and s.last_changed.date() == now().date() and s.context.parent_id is none and s.context.user_id is not none %}
                  {% if not manual %}
                    {% set ns.allowed = ns.allowed + [e] %}
                  {% endif %}
                {% endfor %}
                {{ ns.allowed }}

      # FALL 2: Öffnen (Sonne zieht weiter)
      - conditions:
          - condition: template
            value_template: "{{ current_azimuth >= (stop_haupt | float) }}"
        sequence:
          # Markise öffnen
          - if:
              - condition: template
                value_template: >-
                  {% set s = states[markise_entity] %}
                  {{ not (s is not none and s.last_changed.date() == now().date() and s.context.parent_id is none and s.context.user_id is not none) }}
            then:
              - action: cover.set_cover_position
                data:
                  position: 100
                target:
                  entity_id: "{{ markise_entity }}"
          
          # Hauptrollläden öffnen
          - action: cover.set_cover_position
            data:
              position: 100
            target:
              entity_id: >-
                {% set ns = namespace(allowed=[]) %}
                {% for e in haupt_entities %}
                  {% set s = states[e] %}
                  {% set manual = s is not none and s.last_changed.date() == now().date() and s.context.parent_id is none and s.context.user_id is not none %}
                  {% if not manual %}
                    {% set ns.allowed = ns.allowed + [e] %}
                  {% endif %}
                {% endfor %}
                {{ ns.allowed }}

  # ---------------------------------------------------------------------------
  # BLOCK B: GAUBENBESCHATTUNG
  # ---------------------------------------------------------------------------
  - if:
      - condition: template
        value_template: >-
          {% set s = states[gaube_entity] %}
          {{ not (s is not none and s.last_changed.date() == now().date() and s.context.parent_id is none and s.context.user_id is not none) }}
    then:
      - choose:
          # FALL 1: Schließen
          - conditions:
              - condition: template
                value_template: "{{ states(sensor_helligkeit) | float(0) > limit_helligkeit | float }}"
              - condition: template
                value_template: "{{ states(sensor_temp) | float(0) > limit_temp | float }}"
              - condition: template
                value_template: "{{ current_azimuth >= (start_gaube | float) and current_azimuth < (stop_gaube | float) }}"
            sequence:
              - action: cover.set_cover_position
                data:
                  position: "{{ p_gaube }}"
                target:
                  entity_id: "{{ gaube_entity }}"

          # FALL 2: Öffnen
          - conditions:
              - condition: template
                value_template: "{{ current_azimuth >= (stop_gaube | float) }}"
            sequence:
              - action: cover.set_cover_position
                data:
                  position: 100
                target:
                  entity_id: "{{ gaube_entity }}"
