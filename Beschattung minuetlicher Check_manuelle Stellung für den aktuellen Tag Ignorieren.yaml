blueprint:
  name: "Erweiterte Beschattung nach Azimut, Helligkeit & Temperatur"
  description: "Steuert Markise und Rollladen basierend auf Sonnenstand, Temperatur und Helligkeit inklusive Erkennung manueller Eingriffe."
  domain: automation
  input:
    # Sensoren
    illuminance_sensor:
      name: Helligkeitssensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: illuminance
    temperature_sensor:
      name: Temperatursensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    
    # Aktoren
    cover_markise:
      name: Markise
      selector:
        entity:
          filter:
            - domain: cover
    cover_schlafzimmer:
      name: Rollladen Schlafzimmer
      selector:
        entity:
          filter:
            - domain: cover
    cover_az_garten:
      name: Jalousie Arbeitszimmer (Garten)
      selector:
        entity:
          filter:
            - domain: cover
    cover_az_gaube:
      name: Jalousie Arbeitszimmer (Gaube)
      selector:
        entity:
          filter:
            - domain: cover

    # Blockade-Helfer
    block_markise:
      name: Helfer Sperre Markise
      selector:
        entity:
          filter:
            - domain: input_boolean
    block_schlafzimmer:
      name: Helfer Sperre Schlafzimmer
      selector:
        entity:
          filter:
            - domain: input_boolean
    block_az_garten:
      name: Helfer Sperre AZ Garten
      selector:
        entity:
          filter:
            - domain: input_boolean
    block_az_gaube:
      name: Helfer Sperre AZ Gaube
      selector:
        entity:
          filter:
            - domain: input_boolean

mode: parallel
max: 10

trigger:
  # Trigger 1: Minütliche Prüfung für die Fahrt
  - platform: time_pattern
    minutes: "/1"
    id: "check_automation"
  # Trigger 2: Überwachung manueller Eingriffe (Positionsänderung)
  - platform: state
    entity_id:
      - !input cover_markise
      - !input cover_schlafzimmer
      - !input cover_az_garten
      - !input cover_az_gaube
    attribute: current_position
    id: "manual_override"
  # Trigger 3: Reset um Mitternacht
  - platform: time
    at: "00:00:00"
    id: "midnight_reset"

condition: []

action:
  - choose:
      # --- FALL 1: Minütliche Prüfung der Fahrbefehle ---
      - conditions:
          - condition: trigger
            id: "check_automation"
          - condition: numeric_state
            entity_id: !input illuminance_sensor
            above: 900
          - condition: numeric_state
            entity_id: !input temperature_sensor
            above: 20
        sequence:
          # --- GRUPPE 1: Markise & Standard-Rollladen ---
          - choose:
              # Azimut 90° bis 270° -> Abwärts
              - conditions:
                  - condition: template
                    value_template: "{{ 90 <= state_attr('sun.sun', 'azimuth') <= 270 }}"
                sequence:
                  - if:
                      - condition: state
                        entity_id: !input block_markise
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_markise
                        data:
                          position: 0
                  - if:
                      - condition: state
                        entity_id: !input block_schlafzimmer
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_schlafzimmer
                        data:
                          position: 40
                  - if:
                      - condition: state
                        entity_id: !input block_az_garten
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_az_garten
                        data:
                          position: 40
              # Azimut ab 280° -> Aufwärts (100%)
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr('sun.sun', 'azimuth') >= 280 }}"
                sequence:
                  - if:
                      - condition: state
                        entity_id: !input block_markise
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_markise
                        data:
                          position: 100
                  - if:
                      - condition: state
                        entity_id: !input block_schlafzimmer
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_schlafzimmer
                        data:
                          position: 100
                  - if:
                      - condition: state
                        entity_id: !input block_az_garten
                        state: "off"
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input cover_az_garten
                        data:
                          position: 100

          # --- GRUPPE 2: Arbeitszimmer Gaube ---
          - choose:
              # Azimut 190° bis 329° -> 20%
              - conditions:
                  - condition: template
                    value_template: "{{ 190 <= state_attr('sun.sun', 'azimuth') < 330 }}"
                  - condition: state
                    entity_id: !input block_az_gaube
                    state: "off"
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input cover_az_gaube
                    data:
                      position: 20
              # Azimut ab 330° -> 100%
              - conditions:
                  - condition: template
                    value_template: "{{ state_attr('sun.sun', 'azimuth') >= 330 }}"
                  - condition: state
                    entity_id: !input block_az_gaube
                    state: "off"
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input cover_az_gaube
                    data:
                      position: 100

      # --- FALL 2: Manueller Eingriff erkannt ---
      - conditions:
          - condition: trigger
            id: "manual_override"
          # Prüft, ob diese Automation sich NICHT innerhalb der letzten 5 Sekunden selbst bewegt hat
          - condition: template
            value_template: >
              {{ (as_timestamp(now()) - as_timestamp(state_attr(this.entity_id, 'last_triggered') | default(0))) > 5 }}
        sequence:
          - choose:
              - conditions: "{{ trigger.entity_id == (blueprint_inputs.cover_markise | default('')) }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input block_markise
              - conditions: "{{ trigger.entity_id == (blueprint_inputs.cover_schlafzimmer | default('')) }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input block_schlafzimmer
              - conditions: "{{ trigger.entity_id == (blueprint_inputs.cover_az_garten | default('')) }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input block_az_garten
              - conditions: "{{ trigger.entity_id == (blueprint_inputs.cover_az_gaube | default('')) }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input block_az_gaube

      # --- FALL 3: Mitternachts-Reset der Helfer ---
      - conditions:
          - condition: trigger
            id: "midnight_reset"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id:
                - !input block_markise
                - !input block_schlafzimmer
                - !input block_az_garten
                - !input block_az_gaube
