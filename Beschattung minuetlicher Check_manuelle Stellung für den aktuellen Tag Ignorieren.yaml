###############################################################################
# Package: Automatische Beschattung mit zuverlässigem manuellen Override
###############################################################################

# 1. Die Helfer-Schalter, um den manuellen Eingriff pro Bereich zu speichern
input_boolean:
  beschattung_override_markise:
    name: "Beschattung: Manueller Eingriff Markise"
    icon: mdi:hand-back-left
  beschattung_override_haupt:
    name: "Beschattung: Manueller Eingriff Hauptrollläden"
    icon: mdi:hand-back-left
  beschattung_override_gaube:
    name: "Beschattung: Manueller Eingriff Gaube"
    icon: mdi:hand-back-left

automation:
  # ---------------------------------------------------------------------------
  # AUTOMATION 1: Jede Minute Werte prüfen und Aktoren steuern
  # ---------------------------------------------------------------------------
  - id: beschattung_intervall_steuerung
    alias: "Beschattung: Minütliche Prüfung"
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      # HIER DEINE ENTITÄTEN UND WUNSCHWERTE ANPASSEN:
      - variables:
          sensor_helligkeit: "sensor.0x8c65a3fffe3daa26_illuminance"
          sensor_temp: "sensor.homematic_ip_sv_w_temperatur"
          limit_helligkeit: 900
          limit_temp: 20
          
          start_haupt: 90
          stop_haupt: 280
          start_gaube: 190
          stop_gaube: 330
          
          pos_markise: 0
          pos_haupt: 20
          pos_gaube: 0
          
          current_azimuth: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"

      # --- SEKTION A: MARKISE ---
      - choose:
          # Wenn NICHT manuell eingegriffen wurde...
          - conditions:
              - condition: state
                entity_id: input_boolean.beschattung_override_markise
                state: "off"
            sequence:
              - choose:
                  # Schließen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ states(sensor_helligkeit) | float(0) > limit_helligkeit }}"
                      - condition: template
                        value_template: "{{ states(sensor_temp) | float(0) > limit_temp }}"
                      - condition: template
                        value_template: "{{ current_azimuth >= start_haupt and current_azimuth < stop_haupt }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: "{{ pos_markise }}"
                        target:
                          entity_id: cover.markise
                  # Öffnen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ current_azimuth >= stop_haupt }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: 100
                        target:
                          entity_id: cover.markise

      # --- SEKTION B: HAUPTROLLLÄDEN ---
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.beschattung_override_haupt
                state: "off"
            sequence:
              - choose:
                  # Schließen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ states(sensor_helligkeit) | float(0) > limit_helligkeit }}"
                      - condition: template
                        value_template: "{{ states(sensor_temp) | float(0) > limit_temp }}"
                      - condition: template
                        value_template: "{{ current_azimuth >= start_haupt and current_azimuth < stop_haupt }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: "{{ pos_haupt }}"
                        target:
                          entity_id:
                            - cover.ja_schlafzimmer_schlafzimmer
                            - cover.ja_arbeitszimmer_jalousie_arbeitszimmer_garten_jalousie
                  # Öffnen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ current_azimuth >= stop_haupt }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: 100
                        target:
                          entity_id:
                            - cover.ja_schlafzimmer_schlafzimmer
                            - cover.ja_arbeitszimmer_jalousie_arbeitszimmer_garten_jalousie

      # --- SEKTION C: GAUBE ---
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.beschattung_override_gaube
                state: "off"
            sequence:
              - choose:
                  # Schließen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ states(sensor_helligkeit) | float(0) > limit_helligkeit }}"
                      - condition: template
                        value_template: "{{ states(sensor_temp) | float(0) > limit_temp }}"
                      - condition: template
                        value_template: "{{ current_azimuth >= start_gaube and current_azimuth < stop_gaube }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: "{{ pos_gaube }}"
                        target:
                          entity_id: cover.ja_arbeitszimmer_gaube_jalousie_arbeitszimmer_gaube_jalousie
                  # Öffnen Bedingung
                  - conditions:
                      - condition: template
                        value_template: "{{ current_azimuth >= stop_gaube }}"
                    sequence:
                      - action: cover.set_cover_position
                        data:
                          position: 100
                        target:
                          entity_id: cover.ja_arbeitszimmer_gaube_jalousie_arbeitszimmer_gaube_jalousie

  # ---------------------------------------------------------------------------
  # AUTOMATION 2: Erkennen, wenn ein MENSCH die Aktoren bedient
  # ---------------------------------------------------------------------------
  - id: beschattung_erkenne_manuellen_eingriff
    alias: "Beschattung: Manuellen Eingriff blockieren"
    mode: parallel
    trigger:
      - platform: event
        event_type: call_service
        event_data:
          domain: cover
    condition:
      # Nur reagieren, wenn der Befehl NICHT von dieser Automation selbst kommt
      - condition: template
        value_template: "{{ trigger.event.context.parent_id is none }}"
      # Nur reagieren, wenn es sich um Fahrbefehle handelt
      - condition: template
        value_template: "{{ trigger.event.data.service in ['set_cover_position', 'open_cover', 'close_cover', 'stop_cover'] }}"
    action:
      - variables:
          target_entity: "{{ trigger.event.data.service_data.entity_id }}"
      - choose:
          # Wurde die Markise manuell bewegt?
          - conditions:
              - condition: template
                value_template: "{{ 'cover.markise' in target_entity }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.beschattung_override_markise
          
          # Wurde einer der Hauptrollläden manuell bewegt?
          - conditions:
              - condition: template
                value_template: >-
                  {{ 'cover.ja_schlafzimmer_schlafzimmer' in target_entity or 
                     'cover.ja_arbeitszimmer_jalousie_arbeitszimmer_garten_jalousie' in target_entity }}
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.beschattung_override_haupt

          # Wurde die Gaube manuell bewegt?
          - conditions:
              - condition: template
                value_template: "{{ 'cover.ja_arbeitszimmer_gaube_jalousie_arbeitszimmer_gaube_jalousie' in target_entity }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.beschattung_override_gaube

  # ---------------------------------------------------------------------------
  # AUTOMATION 3: Jeden Morgen um 00:00 Uhr den manuellen Schutz zurücksetzen
  # ---------------------------------------------------------------------------
  - id: beschattung_reset_override
    alias: "Beschattung: Manuellen Schutz um Mitternacht zurücksetzen"
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.beschattung_override_markise
            - input_boolean.beschattung_override_haupt
            - input_boolean.beschattung_override_gaube
